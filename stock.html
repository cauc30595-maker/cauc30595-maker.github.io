<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Roblox - Dịch vụ Game</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f0f4f8;
            padding: 20px;
        }

        /* Thanh tìm kiếm & Lọc */
        .filter-bar {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-bar select, .filter-bar input {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }

        .btn-search {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-reset {
            background-color: #ff4d4f;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Lưới sản phẩm */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Thẻ sản phẩm */
        .card {
            background-color: #ffffff;
            border: 2px solid #007bff;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .card-header-tag {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: #e83e8c;
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .card-img {
            width: 100%;
            height: 120px;
            background-color: #00a2ff; /* Màu nền giả lập hình ảnh */
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .card-title {
            background-color: #ff4d4f;
            color: white;
            width: 100%;
            padding: 6px 4px;
            font-size: 13px;
            font-weight: bold;
        }

        .card-price-btn {
            background-color: #007bff;
            color: white;
            width: 90%;
            margin: 8px 0;
            padding: 8px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
        }

        .card-price-btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <!-- Thanh Lọc & Tìm kiếm -->
    <div class="filter-bar">
        <select>
            <option>Tất cả</option>
        </select>
        <select>
            <option>Mặc định</option>
        </select>
        <input type="text" placeholder="Tìm kiếm mã sản phẩm, trang phục,...">
        <button class="btn-search">🔍 Tìm Kiếm</button>
        <button class="btn-reset">🗑 Đặt Lại</button>
    </div>

    <!-- Danh sách sản phẩm -->
    <div class="product-grid">
        
        <!-- Sản phẩm 1 -->
        <div class="card">
            <span class="card-header-tag">MS: 26076514</span>
            <div class="card-img">[Ảnh Hạt Fruit]</div>
            <div class="card-title">X1 Hạt Star Fruit</div>
            <button class="card-price-btn">🛒 20.000 đ</button>
        </div>

        <!-- Sản phẩm 2 -->
        <div class="card">
            <span class="card-header-tag">MS: 26070647</span>
            <div class="card-img">[Ảnh Hạt Sun]</div>
            <div class="card-title">X2 Hạt Sun Bloom</div>
            <button class="card-price-btn">🛒 10.000 đ</button>
        </div>

        <!-- Sản phẩm 3 -->
        <div class="card">
            <span class="card-header-tag">MS: 26077847</span>
            <div class="card-img">[Ảnh Vòi Sprinkler]</div>
            <div class="card-title">X50 Vòi Super Sprinkler</div>
            <button class="card-price-btn">🛒 20.000 đ</button>
        </div>

        <!-- Sản phẩm 4 -->
        <div class="card">
            <span class="card-header-tag">MS: 26070082</span>
            <div class="card-img">[Ảnh Ghost Pepper]</div>
            <div class="card-title">X6 Hạt Ghost Pepper</div>
            <button class="card-price-btn">🛒 30.000 đ</button>
        </div>

    </div>

</body>
</html>
